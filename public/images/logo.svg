<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="face-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1EFE8"/>
      <stop offset="100%" stop-color="#D6D3CA"/>
    </linearGradient>
    <linearGradient id="face-dark" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8A6A0"/>
      <stop offset="100%" stop-color="#8A877F"/>
    </linearGradient>
  </defs>

  <!-- Arch opening -->
  <path d="M20,105 L20,50 Q20,15 60,15 Q100,15 100,50 L100,105 Z"
        fill="none" stroke="#F1EFE8" stroke-width="6" stroke-linejoin="round"/>

  <!-- Left pillar -->
  <rect x="17" y="52" width="9" height="56" rx="1" fill="#A8A6A0"/>

  <!-- Right pillar -->
  <rect x="94" y="52" width="9" height="56" rx="1" fill="#A8A6A0"/>

  <!-- Arch curve (structural) -->
  <path d="M17,55 Q17,14 60,14 Q103,14 103,55"
        fill="none" stroke="#A8A6A0" stroke-width="6" stroke-linecap="round"/>

  <!-- Keystone block — the centrepiece -->
  <polygon points="48,10 72,10 76,30 44,30" fill="url(#face-light)"/>
  <polygon points="60,10 72,10 76,30 60,30" fill="url(#face-dark)"/>

  <!-- Keystone bevel lines -->
  <line x1="48" y1="10" x2="44" y2="30" stroke="#8A877F" stroke-width="1" opacity="0.5"/>
  <line x1="72" y1="10" x2="76" y2="30" stroke="#8A877F" stroke-width="1" opacity="0.5"/>
  <line x1="48" y1="10" x2="72" y2="10" stroke="#C8C5BD" stroke-width="0.75"/>
</svg>
